name: SmartChart

options:
  bundleIdPrefix: com.smartchart
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    PRODUCT_NAME: SmartChart
    PRODUCT_BUNDLE_IDENTIFIER: com.smartchart.app
    TARGETED_DEVICE_FAMILY: "2"
    SWIFT_VERSION: "5.10"
    ALWAYS_SEARCH_USER_PATHS: false
    SUPPORTS_MACCATALYST: false
  configs:
    Debug:
      ENABLE_TESTABILITY: true
      ONLY_ACTIVE_ARCH: true

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift.git
    from: 2.0.0

targets:
  SmartChart:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    info:
      path: SmartChart/App/Info.plist
      properties:
        CFBundleDisplayName: Smart Chart
        CFBundleURLTypes:
          - CFBundleURLName: com.smartchart.app.auth
            CFBundleURLSchemes:
              - ichart
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
          UISceneConfigurations: {}
        UILaunchScreen: {}
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        SupabaseURL: "$(SUPABASE_URL)"
        SupabasePublishableKey: "$(SUPABASE_PUBLISHABLE_KEY)"
        SupabaseAnonKey: "$(SUPABASE_ANON_KEY)"
    sources:
      - path: SmartChart
        excludes:
          - Resources
      - path: SmartChart/Resources
        buildPhase: resources
      - path: ThirdParty/NotationFonts/SMuFL
        buildPhase: resources
        excludes:
          - "**/metadata.json"
    dependencies:
      - package: Supabase
        product: Supabase
  SmartChartTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    settings:
      base:
        PRODUCT_NAME: SmartChartTests
        PRODUCT_BUNDLE_IDENTIFIER: com.smartchart.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/SmartChart.app/SmartChart"
        BUNDLE_LOADER: "$(TEST_HOST)"
    sources:
      - path: SmartChartTests
    dependencies:
      - target: SmartChart

schemes:
  SmartChart:
    build:
      targets:
        SmartChart: all
    test:
      targets:
        - SmartChartTests
