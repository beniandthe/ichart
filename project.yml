name: iChart

options:
  bundleIdPrefix: com.ichart
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    PRODUCT_NAME: iChart
    PRODUCT_BUNDLE_IDENTIFIER: com.ichart.app
    DEVELOPMENT_TEAM: N6G8X4K46U
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "10"
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    TARGETED_DEVICE_FAMILY: "2"
    SWIFT_VERSION: "5.10"
    ALWAYS_SEARCH_USER_PATHS: false
    SUPPORTS_MACCATALYST: false
    SUPABASE_URL: https://pausvvwoazbvmzyrebwl.supabase.co
    SUPABASE_PUBLISHABLE_KEY: sb_publishable_ZyyagOMS_Dfyf9pASisrtQ_9Dei0_x7
    SUPABASE_ANON_KEY: ""
  configs:
    Debug:
      ENABLE_TESTABILITY: true
      ONLY_ACTIVE_ARCH: true
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG

fileGroups:
  - StoreKit

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift.git
    from: 2.0.0

targets:
  iChart:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    settings:
      configs:
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: Apple Distribution
          PROVISIONING_PROFILE_SPECIFIER: iChart App Store
    info:
      path: iChart/App/Info.plist
      properties:
        CFBundleDisplayName: iChart
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleURLTypes:
          - CFBundleURLName: com.ichart.app.auth
            CFBundleURLSchemes:
              - ichart
        ITSAppUsesNonExemptEncryption: false
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
          UISceneConfigurations: {}
        UILaunchScreen: {}
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        SupabaseURL: "$(SUPABASE_URL)"
        SupabasePublishableKey: "$(SUPABASE_PUBLISHABLE_KEY)"
        SupabaseAnonKey: "$(SUPABASE_ANON_KEY)"
    sources:
      - path: iChart
        excludes:
          - Resources
      - path: iChart/Resources
        buildPhase: resources
      - path: ThirdParty/NotationFonts/SMuFL
        buildPhase: resources
        excludes:
          - "**/metadata.json"
    dependencies:
      - package: Supabase
        product: Supabase
  iChartTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    settings:
      base:
        PRODUCT_NAME: iChartTests
        PRODUCT_BUNDLE_IDENTIFIER: com.ichart.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/iChart.app/iChart"
        BUNDLE_LOADER: "$(TEST_HOST)"
    sources:
      - path: iChartTests
    dependencies:
      - target: iChart

schemes:
  iChart:
    build:
      targets:
        iChart: all
    run:
      config: Debug
      storeKitConfiguration: StoreKit/iChartProSubscriptions.storekit
    test:
      targets:
        - iChartTests
