<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>iChart B4.8A-H1 Canon Logo</title>
  <style>
    :root {
      --paper: #f7f3ea;
      --stage: #0f151b;
      --logo-blue: #8fd3e6;
      --staff: rgba(255, 255, 255, 0.24);
      --barline: rgba(255, 255, 255, 0.23);
    }

    @font-face {
      font-family: "iChartFinaleMaestroText";
      src: url("../../../../SmartChart/Resources/Fonts/FinaleMaestroText-Regular.otf") format("opentype");
    }

    @font-face {
      font-family: "iChartFinaleMaestroTextItalic";
      src: url("../../../../SmartChart/Resources/Fonts/FinaleMaestroText-Italic.otf") format("opentype");
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-width: 100%;
      height: 100%;
      min-height: 100%;
      margin: 0;
      background: var(--stage);
      print-color-adjust: exact;
      -webkit-print-color-adjust: exact;
    }

    body {
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .sheet {
      display: grid;
      place-items: center;
      width: 100vw;
      height: 100vh;
      padding: 9vh 8vw 10vh;
      background: var(--stage);
    }

    .logo {
      position: relative;
      display: inline-flex;
      align-items: flex-end;
      gap: 0;
      color: var(--paper);
      font-family: "iChartFinaleMaestroText", "Times New Roman", ui-serif, serif;
      font-size: clamp(280px, 20vw, 900px);
      font-weight: 700;
      line-height: 0.86;
      letter-spacing: 0;
      isolation: isolate;
    }

    .font-i {
      position: relative;
      z-index: 2;
      display: inline-block;
      align-self: flex-end;
      color: var(--paper);
      font-family: "iChartFinaleMaestroTextItalic", "Times New Roman", ui-serif, serif;
      font-size: 0.58em;
      line-height: 0.86;
      margin-right: -0.025em;
      transform: translate(-0.055em, 0);
      transform-origin: bottom center;
    }

    .staff-word {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 0;
      line-height: 0.86;
      isolation: isolate;
    }

    .staff-word::after {
      content: "";
      position: absolute;
      z-index: 3;
      top: 0.08em;
      left: 0;
      right: -0.14em;
      height: 0.72em;
      background:
        linear-gradient(var(--staff), var(--staff)) 0 0 / 100% 0.014em no-repeat,
        linear-gradient(var(--staff), var(--staff)) 0 25% / 100% 0.014em no-repeat,
        linear-gradient(var(--staff), var(--staff)) 0 50% / 100% 0.014em no-repeat,
        linear-gradient(var(--staff), var(--staff)) 0 75% / 100% 0.014em no-repeat,
        linear-gradient(var(--staff), var(--staff)) 0 100% / 100% 0.014em no-repeat;
      pointer-events: none;
    }

    .staff-word::before {
      content: "";
      position: absolute;
      z-index: 4;
      top: 0.08em;
      right: -0.14em;
      width: 0.078em;
      height: 0.72em;
      background:
        linear-gradient(var(--barline), var(--barline)) 0 0 / 0.012em 100% no-repeat,
        linear-gradient(var(--barline), var(--barline)) 100% 0 / 0.012em 100% no-repeat;
      pointer-events: none;
    }

    .c-letter {
      position: relative;
      z-index: 2;
      display: inline-block;
      color: var(--logo-blue);
      line-height: 0.86;
    }

    .rest {
      position: relative;
      z-index: 2;
      display: inline-block;
      align-self: center;
      color: var(--paper);
      font-size: 0.74em;
      line-height: 0.74;
      margin-left: -0.035em;
      transform: translateY(0.01em);
    }

    @page {
      size: 16in 8in;
      margin: 0;
    }
  </style>
</head>
<body>
  <main class="sheet" aria-label="iChart B4.8A-H1 canon baseline-aligned italic logo">
    <div class="logo">
      <span class="font-i">i</span><span class="staff-word"><span class="c-letter">C</span><span class="rest">hart</span></span>
    </div>
  </main>
</body>
</html>
