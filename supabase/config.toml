project_id = "ichart"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[auth]
enabled = true
site_url = "ichart://auth-callback"
additional_redirect_urls = ["ichart://auth-callback"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = true
max_frequency = "1m"
otp_length = 6

[functions.app-store-server-notifications]
enabled = true
verify_jwt = false
entrypoint = "./functions/app-store-server-notifications/index.mjs"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/app-store-server-notifications/*.html" ]

[functions.storekit-subscription-claims]
enabled = true
verify_jwt = true
entrypoint = "./functions/storekit-subscription-claims/index.mjs"
